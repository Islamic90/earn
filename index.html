<script type="module">
// Firebase SDK
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, collection, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2c0riWkuN557GiZHfsBOkykFHUkV9Q2Q",
  authDomain: "spin-to-earn-14394.firebaseapp.com",
  databaseURL: "https://spin-to-earn-14394-default-rtdb.firebaseio.com",
  projectId: "spin-to-earn-14394",
  storageBucket: "spin-to-earn-14394.firebasestorage.app",
  messagingSenderId: "266803939719",
  appId: "1:266803939719:web:284c73b1fe2201183a6b22",
  measurementId: "G-RR5QD86XPX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Firebase Storage Helper
const FB = {
  async getData(collectionName, docId) {
    try {
      const docRef = doc(db, collectionName, docId);
      const docSnap = await getDoc(docRef);
      return docSnap.exists() ? docSnap.data().data : null;
    } catch(e) { console.error(e); return null; }
  },
  async setData(collectionName, docId, data) {
    try {
      await setDoc(doc(db, collectionName, docId), { data, updatedAt: new Date().toISOString() }, { merge: true });
    } catch(e) { console.error(e); }
  },
  async getAll(collectionName) {
    try {
      const querySnapshot = await getDocs(collection(db, collectionName));
      let result = {};
      querySnapshot.forEach(doc => { result[doc.id] = doc.data().data; });
      return result;
    } catch(e) { console.error(e); return {}; }
  }
};
window.FB = FB;
</script>

.typing-dots{display:flex;gap:4px;padding:8px 16px;}
.typing-dots span{width:7px;height:7px;background:var(--text2);border-radius:50%;animation:typingBounce 1.4s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
.blue-tick{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:linear-gradient(135deg,#1da1f2,#0d71c4);border-radius:50%;font-size:10px;color:#fff;margin-left:4px;vertical-align:middle;flex-shrink:0;box-shadow:0 1px 3px rgba(29,161,242,0.4);}
.blue-tick.sm{width:14px;height:14px;font-size:8px;}
.blue-tick.lg{width:22px;height:22px;font-size:12px;}
.name-with-tick{display:inline-flex;align-items:center;gap:0;}
.team-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;}
.team-member-card{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.2s;}
.team-member-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,229,255,0.1);}
.team-member-avatar{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--primary),var(--primary2));display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.team-member-info{flex:1;min-width:0;}
.team-member-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px;}
.team-member-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.team-member-badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.team-member-right{text-align:right;flex-shrink:0;}
.team-level-tabs{display:flex;gap:6px;margin-bottom:16px;}
.team-level-tab{padding:8px 20px;border-radius:30px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.team-level-tab:hover{border-color:var(--primary);color:var(--primary);}
.team-level-tab.active{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#050d1a;border-color:transparent;}
.team-commission-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.team-commission-item:last-child{border-bottom:none;}
.sec-score-card{background:linear-gradient(135deg,rgba(0,229,255,0.1),rgba(0,153,187,0.05));border:1px solid var(--primary);border-radius:20px;padding:20px;margin-bottom:20px;}
.sec-score-ring{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;position:relative;}
.sec-score-label{font-size:36px;font-weight:800;}
.sec-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--bg2);border-radius:14px;margin:8px 0;transition:.2s;}
.sec-item:hover{background:var(--bg3);}
.sec-item-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.sec-item-icon.green{background:rgba(0,230,118,0.15);color:var(--green);}
.sec-item-icon.red{background:rgba(255,82,82,0.15);color:var(--red);}
.sec-item-icon.orange{background:rgba(255,152,0,0.15);color:var(--orange);}
.sec-item-icon.cyan{background:rgba(0,229,255,0.15);color:var(--primary);}
.sec-item-info{flex:1;min-width:0;}
.sec-item-title{font-weight:600;font-size:14px;}
.sec-item-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.sec-toggle{position:relative;width:44px;height:24px;background:var(--bg3);border-radius:12px;cursor:pointer;transition:.2s;flex-shrink:0;}
.sec-toggle.on{background:var(--green);}
.sec-toggle::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s;}
.sec-toggle.on::after{left:22px;}
.pw-strength{height:6px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-top:8px;}
.pw-strength-fill{height:100%;transition:.3s;border-radius:3px;}
.session-device{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border-radius:12px;margin:6px 0;}
.session-device.current{border:1px solid var(--green);}
</style>
</head>
<body>

<!-- AGREEMENT PAGE (First) -->

    <div class="auth-logo"><span class="mosque-icon">🕌</span><h1>Islamic Business Solutions</h1><p>Halal Earnings Platform</p></div>

<!-- LOGIN PAGE (No admin message) -->

    <div class="input-wrap"><i class="fa fa-envelope"></i><input type="email" id="loginEmail" placeholder="Email Address"></div>

</div>

<!-- REGISTER PAGE -->
<div id="registerPage" class="auth-wrap" style="display:none;">
  <div class="auth-box">
    <div class="auth-logo"><span class="mosque-icon">✨</span><h1>Create Account</h1></div>
    <div class="input-wrap"><i class="fa fa-user"></i><input type="text" id="regName" placeholder="Full Name"></div>
    <div class="input-wrap"><i class="fa fa-envelope"></i><input type="email" id="regEmail" placeholder="Email"></div>

    <button class="btn btn-primary" id="registerBtn">Create Account</button>
    <button class="btn btn-outline" id="backLoginBtn">← Back to Login</button>
  </div>
</div>

<!-- DASHBOARD (all pages container) -->
<div class="dashboard" id="dashboard">
  <div class="mobile-overlay" id="mobileOverlay" onclick="closeMobileSidebar()"></div>
  <button class="sidebar-toggle-fixed" id="sidebarToggleFixed" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button>
  <div class="sidebar" id="sidebar">
    <div class="sb-header"><div style="font-size:24px;">🕌</div><div class="sb-logo-text"><h3>IBS Platform</h3><p>Halal Earnings</p></div><button class="sb-toggle" onclick="toggleSidebar()"><i class="fa fa-bars"></i></button></div>
    <div id="sidebarNav"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;"><button class="mobile-menu-btn" onclick="openMobileSidebar()"><i class="fa fa-bars"></i></button><div class="topbar-left"><h2 id="pageTitle">Dashboard</h2><p id="pageSubtitle">Welcome back</p></div></div>
      <div class="topbar-right"><button class="icon-btn" onclick="toggleTheme()"><i class="fa fa-moon"></i></button><button class="icon-btn" onclick="navTo('notifications')"><i class="fa fa-bell"></i></button><div class="user-chip" onclick="navTo('profile')"><div class="avatar" id="topAvatar">👤</div><div><div class="user-chip-name" id="topName">User</div><div class="user-chip-id" id="topId">ID: ---</div></div></div><button class="icon-btn" onclick="doLogout()"><i class="fa fa-sign-out-alt"></i></button></div>
    </div>
    <div id="pagesContainer"></div>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script>
// ======================== STORAGE ========================
const S = {
  _cache: {},
  _loaded: false,
  async _init() {
    if (this._loaded) return;
    try {
      if (window.FB) {
        const users = await window.FB.getAll('users');
        if (users && Object.keys(users).length > 0) this._cache.users = users;
        const wd = await window.FB.getData('withdrawals', 'all');
        if (wd) this._cache.wd = wd;
        const pending = await window.FB.getData('pending', 'all');
        if (pending) this._cache.pending = pending;
        const tasks = await window.FB.getData('tasks', 'all');
        if (tasks) this._cache.tasks = tasks;
        const ads = await window.FB.getData('ads', 'all');
        if (ads) this._cache.ads = ads;
        const msgs = await window.FB.getData('messages', 'all');
        if (msgs) this._cache.msgs = msgs;
        const logs = await window.FB.getData('logs', 'all');
        if (logs) this._cache.logs = logs;
        this._loaded = true;
      }
    } catch(e) { console.log('Using localStorage fallback'); }
  },
  users:()=>S._cache.users || JSON.parse(localStorage.getItem('ibs_users_final')||'{}'),
  saveUsers:async u=>{S._cache.users=u;if(window.FB)await window.FB.setData('users','all',u);localStorage.setItem('ibs_users_final',JSON.stringify(u));},
  wd:()=>S._cache.wd || JSON.parse(localStorage.getItem('ibs_wd_final')||'[]'),
  saveWd:async w=>{S._cache.wd=w;if(window.FB)await window.FB.setData('withdrawals','all',w);localStorage.setItem('ibs_wd_final',JSON.stringify(w));},
  pending:()=>S._cache.pending || JSON.parse(localStorage.getItem('ibs_pending_final')||'[]'),
  savePending:async p=>{S._cache.pending=p;if(window.FB)await window.FB.setData('pending','all',p);localStorage.setItem('ibs_pending_final',JSON.stringify(p));},
  tasks:()=>S._cache.tasks || JSON.parse(localStorage.getItem('ibs_tasks_final')||'[]'),
  saveTasks:async t=>{S._cache.tasks=t;if(window.FB)await window.FB.setData('tasks','all',t);localStorage.setItem('ibs_tasks_final',JSON.stringify(t));},
  ads:()=>S._cache.ads || JSON.parse(localStorage.getItem('ibs_ads_final')||'[]'),
  saveAds:async a=>{S._cache.ads=a;if(window.FB)await window.FB.setData('ads','all',a);localStorage.setItem('ibs_ads_final',JSON.stringify(a));},
  msgs:()=>S._cache.msgs || JSON.parse(localStorage.getItem('ibs_msgs_final')||'{}'),
  saveMsgs:async m=>{S._cache.msgs=m;if(window.FB)await window.FB.setData('messages','all',m);localStorage.setItem('ibs_msgs_final',JSON.stringify(m));},
  logs:()=>S._cache.logs || JSON.parse(localStorage.getItem('ibs_logs_final')||'[]'),
  saveLogs:async l=>{S._cache.logs=l;if(window.FB)await window.FB.setData('logs','all',l);localStorage.setItem('ibs_logs_final',JSON.stringify(l));},
  adminMsg:()=>localStorage.getItem('ibs_admin_msg_final')||'<h3>Welcome to Islamic Business Solutions</h3><p>This platform is for halal online earnings.</p><p><strong>Rules:</strong><br>1. No fake accounts.<br>2. Withdrawals processed within 24h.<br>3. Referral fraud will lead to suspension.</p>',
  setAdminMsg:m=>localStorage.setItem('ibs_admin_msg_final',m),
  get:async (k,d)=>{
    if(k.startsWith('ibs_') && window.FB) {
      const key = k.replace('ibs_','');
      const data = await window.FB.getData(key, 'all');
      if(data !== null) return data;
    }
    return JSON.parse(localStorage.getItem(k)||JSON.stringify(d));
  },
  set:async (k,v)=>{
    localStorage.setItem(k,JSON.stringify(v));
    if(k.startsWith('ibs_') && window.FB) {
      const key = k.replace('ibs_','');
      await window.FB.setData(key, 'all', v);
    }
  }
};
let CU = null;

// Initialize Firebase data on load
S._init();

// ======================== HELPERS ========================
function toast(msg,type=''){let t=document.getElementById('toastContainer');let el=document.createElement('div');el.className='toast'+(type?' '+type:'');el.textContent=msg;t.appendChild(el);setTimeout(()=>el.remove(),3000);}
function fmtMoney(n){return '₨'+(+n||0).toFixed(2);}
function fmtDate(ts){return new Date(ts).toLocaleString('en-PK',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}
function escHTML(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}
function getU(){return S.users()[CU];}
function saveU(u){let uu=S.users();uu[CU]=u;S.saveUsers(uu);}
function addTx(u,t,a,d,s='completed'){if(!u.transactions)u.transactions=[];u.transactions.push({type:t,amount:a,desc:d,status:s,ts:new Date().toISOString()});}
function addNotif(email,msg,icon='🔔'){let uu=S.users();if(uu[email]){if(!uu[email].notifs)uu[email].notifs=[];uu[email].notifs.unshift({msg,icon,read:false,ts:new Date().toISOString()});if(uu[email].notifs.length>50)uu[email].notifs.pop();S.saveUsers(uu);}}
function addLog(action,details=''){let logs=S.logs();logs.unshift({action,details,ts:new Date().toISOString(),by:CU||'system'});if(logs.length>500)logs=logs.slice(0,500);S.saveLogs(logs);}
let _currentAdminTab='overview';
function bt(verified,size=''){return verified?`<span class="blue-tick ${size}">✓</span>`:'';}
function nm(name,verified,size=''){return `<span class="name-with-tick">${escHTML(name)}${bt(verified,size)}</span>`;}

// ======================== AUTH & AGREEMENT ========================
window.onload=function(){
  let users=S.users();
  if(!users['zainab@ibs.com']){
    users['zainab@ibs.com']={userId:'000001',name:'Admin',email:'zainab@ibs.com',wa:'923001234567',password:'halal123',joinDate:new Date().toISOString(),balance:9999,totalEarnings:0,totalCommission:0,referralCode:'ADMIN001',referredBy:null,teamCount:0,level:5,totalDeposits:10000000,transactions:[],loyaltyPoints:9999,notifs:[],packagePerks:{dailyAds:999,adReward:0.25},activePackage:{name:'Diamond',price:5},blocked:false,withdrawalPin:'1234',avatar:'👑',displayName:'Admin',verified:true,kycStatus:'approved',lastLogin:new Date().toISOString()};
  }
  if(!users['zainab@ibs.com']){
    users['zainab@ibs.com']={userId:'000002',name:'Zainab',email:'zainab@ibs.com',wa:'923001234568',password:'Zainabibs00',joinDate:new Date().toISOString(),balance:5000,totalEarnings:0,totalCommission:0,referralCode:'ADMIN002',referredBy:null,teamCount:0,level:5,totalDeposits:5000,transactions:[],loyaltyPoints:5000,notifs:[],packagePerks:{dailyAds:999,adReward:0.25},activePackage:{name:'Diamond',price:5},blocked:false,withdrawalPin:'5678',avatar:'👸',displayName:'Zainab',verified:true,kycStatus:'approved',lastLogin:new Date().toISOString()};
    S.saveUsers(users);
    S.saveAds([{id:1,name:'Islamic App Ad',reward:0.02},{id:2,name:'Business Course',reward:0.03},{id:3,name:'Halal Products',reward:0.04}]);
    S.saveTasks([{id:1,name:'Follow on Instagram',reward:0.10,url:'https://instagram.com'},{id:2,name:'Join Telegram',reward:0.15,url:'https://t.me'},{id:3,name:'Watch YouTube',reward:0.05,url:'https://youtube.com'}]);
  }
  document.getElementById('agreementText').innerHTML=S.adminMsg();
  document.getElementById('agreeFinal').addEventListener('change',function(e){document.getElementById('agreeContinueBtn').disabled=!e.target.checked;});
  document.getElementById('agreeContinueBtn').onclick=function(){showLoginPage();};
  if(localStorage.getItem('theme')==='light')document.body.classList.add('light');
  let sess=sessionStorage.getItem('ibs_session');
  if(sess && users[sess] && !users[sess].blocked){
    CU=sess; initDashboard(users[sess]);
    document.getElementById('agreementPage').style.display='none';
    document.getElementById('loginPage').style.display='none';
    document.getElementById('dashboard').style.display='block';
  } else {
    document.getElementById('agreementPage').style.display='flex';
  }
  // Bind buttons
  document.getElementById('loginBtn').onclick=doLogin;
  document.getElementById('showRegisterBtn').onclick=showRegister;
  document.getElementById('forgotBtn').onclick=forgotPassword;
  document.getElementById('registerBtn').onclick=doRegister;
  document.getElementById('backLoginBtn').onclick=showLogin;
};
function showLoginPage(){ document.getElementById('agreementPage').style.display='none'; document.getElementById('loginPage').style.display='flex'; }
function showRegister(){ document.getElementById('loginPage').style.display='none'; document.getElementById('registerPage').style.display='flex'; }
function showLogin(){ document.getElementById('registerPage').style.display='none'; document.getElementById('loginPage').style.display='flex'; }
function doLogin(){
  let email=document.getElementById('loginEmail').value.trim().toLowerCase();
  let pass=document.getElementById('loginPass').value;
  let users=S.users();
  if(!users[email]||users[email].password!==pass){toast('Invalid email or password','error');return;}
  if(users[email].blocked){toast('Account blocked','error');return;}
  CU=email;sessionStorage.setItem('ibs_session',email);
  initDashboard(users[email]);
  addLog('User Login',email);toast('Welcome back!','success');
}
function doRegister(){
  let name=document.getElementById('regName').value.trim();
  let email=document.getElementById('regEmail').value.trim().toLowerCase();
  let wa=document.getElementById('regWa').value.trim();
  let pass=document.getElementById('regPass').value;
  let ref=document.getElementById('regRef').value.trim().toUpperCase();
  let terms=document.getElementById('regTerms').checked;
  if(!name||!email||!wa||!pass){toast('Fill all fields','error');return;}
  if(pass.length<6){toast('Password min 6 chars','error');return;}
  if(!terms){toast('Accept terms','error');return;}
  let users=S.users();
  if(users[email]){toast('Email exists','error');return;}
  let refBy=null;
  if(ref){let r=Object.values(users).find(u=>u.referralCode===ref);if(r)refBy=r.email;else{toast('Invalid referral code','error');return;}}
  let avatars=['🕌','🕋','☪️','⭐','🌙','🕊️','📿','🌹','✨','🌟','🍃','🎯'];
  let code=name.replace(/\s/g,'').substring(0,4)+Math.random().toString(36).substring(2,6);
  users[email]={userId:Math.floor(100000+Math.random()*900000)+'',name,email,wa,password:pass,joinDate:new Date().toISOString(),balance:0,totalEarnings:0,totalCommission:0,referralCode:code.toUpperCase(),referredBy:refBy,teamCount:0,level:1,totalDeposits:0,transactions:[],loyaltyPoints:0,notifs:[],packagePerks:{dailyAds:10,adReward:0.02},activePackage:null,blocked:false,withdrawalPin:null,avatar:avatars[Math.floor(Math.random()*avatars.length)],displayName:name,verified:false,kycStatus:'pending',lastLogin:new Date().toISOString()};
  if(refBy && users[refBy]){users[refBy].teamCount++;addNotif(refBy,`${name} joined using your link!`,'👥');}
  S.saveUsers(users);addLog('User Registered',email);toast('Account created! Please login.','success');showLogin();
}
function forgotPassword(){let e=prompt('Enter email');if(e){let u=S.users()[e.toLowerCase()];if(u){let np=prompt('New password');if(np&&np.length>=6){u.password=np;S.saveUsers(u);toast('Password reset','success');}}else toast('Email not found','error');}}
function doLogout(){sessionStorage.removeItem('ibs_session');location.reload();}
function toggleTheme(){document.body.classList.toggle('light');S.set('theme',document.body.classList.contains('light')?'light':'dark');}
function toggleSidebar(){let sb=document.getElementById('sidebar');sb.classList.toggle('mini');if(sb.classList.contains('mini')){sb.style.marginLeft='-260px';document.getElementById('sidebarToggleFixed').classList.add('show');}else{sb.style.marginLeft='0';document.getElementById('sidebarToggleFixed').classList.remove('show');}}
function openMobileSidebar(){document.getElementById('sidebar').classList.add('mobile-open');document.getElementById('mobileOverlay').classList.add('show');document.getElementById('sidebarToggleFixed').classList.remove('show');}
function closeMobileSidebar(){document.getElementById('sidebar').classList.remove('mobile-open');document.getElementById('mobileOverlay').classList.remove('show');}

function initDashboard(u){
  document.getElementById('dashboard').style.display='block';
  document.getElementById('agreementPage').style.display='none';
  document.getElementById('loginPage').style.display='none';
  document.getElementById('topAvatar').textContent=u.avatar;
  document.getElementById('topName').innerHTML=nm(u.displayName||u.name,u.verified,'sm');
  document.getElementById('topId').textContent='ID: '+u.userId;
  buildSidebar(u);
  // Create pages
  const pages=['home','ads','deposit','withdraw','transactions','team','leaderboard','invite','boost','profile','notifications','security','settings','support','developers','admin'];
  let html=''; pages.forEach(p=>{html+=`<div id="page-${p}" class="page"></div>`;});
  document.getElementById('pagesContainer').innerHTML=html;
  navTo('home');
  setInterval(()=>{if(CU)loadPage('home');},60000);
}
function buildSidebar(u){
  let groups=[
    {t:'MAIN',items:[{id:'home',icon:'fa-home',label:'Home'},{id:'ads',icon:'fa-play-circle',label:'Ads'}]},
    {t:'FINANCE',items:[{id:'deposit',icon:'fa-plus-circle',label:'Buy Package'},{id:'withdraw',icon:'fa-minus-circle',label:'Withdraw'},{id:'transactions',icon:'fa-history',label:'History'}]},
    {t:'SOCIAL',items:[{id:'team',icon:'fa-users',label:'Team'},{id:'leaderboard',icon:'fa-trophy',label:'Leaderboard'},{id:'invite',icon:'fa-share-alt',label:'Invite'},{id:'boost',icon:'fa-rocket',label:'Boost'}]},
    {t:'ACCOUNT',items:[{id:'profile',icon:'fa-user-circle',label:'Profile'},{id:'notifications',icon:'fa-bell',label:'Notifs'},{id:'security',icon:'fa-shield-alt',label:'Security'},{id:'settings',icon:'fa-cog',label:'Settings'},{id:'support',icon:'fa-headset',label:'Support'}]},
    {t:'DEVELOPER',items:[{id:'developers',icon:'fa-code',label:'Developers'}]}
  ];
  if(u.email==='admin@ibs.com'||u.email==='zainab@ibs.com') groups.push({t:'ADMIN',items:[{id:'admin',icon:'fa-crown',label:'Admin'}]});
  let h='';
  groups.forEach(g=>{h+=`<div class="sb-section-title">${g.t}</div>`;g.items.forEach(i=>{
    let badge='';

function setPin(){let pin=prompt('Enter 4-digit PIN');if(/^\d{4}$/.test(pin)){let c=prompt('Confirm PIN');if(c!==pin){toast('PINs don\'t match','error');return;}let u=getU();u.withdrawalPin=pin;saveU(u);addSecLog('PIN Set');toast('PIN set successfully','success');loadSecurity();}else if(pin)toast('PIN must be 4 digits','error');}

function changePassword(){let old=prompt('Current password');let u=getU();if(old!==u.password){toast('Wrong password','error');addSecLog('Failed password change attempt');return;}let np=prompt('New password (8+ chars recommended)');if(!np||np.length<6){toast('Password too short (min 6)','error');return;}let str=pwStrength(np);let c=prompt(`Password strength: ${str.label}\nConfirm new password:`);if(c!==np){toast('Passwords don\'t match','error');return;}u.password=np;u.lastPwChange=new Date().toISOString();saveU(u);addSecLog('Password Changed');toast('Password changed','success');loadSecurity();}

function autoBotReply(userMsg){
  let lc=userMsg.toLowerCase();
  let reply='';
  if(lc.includes('deposit'))reply='💰 For deposit issues:\n• Deposits get 5% cashback instantly\n• Min deposit: $1\n• Referrer earns 10% commission\n• An agent will assist you shortly!';
  else if(lc.includes('withdraw'))reply='💸 Withdrawal info:\n• Min withdrawal: $5\n• Methods: EasyPaisa, JazzCash, Bank, USDT\n• Auto-approved under $10\n• Pending withdrawals processed within 24h';
  else if(lc.includes('account')||lc.includes('block'))reply='👤 Account help:\n• To verify, go to Profile → Upload KYC\n• Set a withdrawal PIN in Security\n• If blocked, contact support for review';
  else if(lc.includes('package'))reply='💎 Package info:\n• Packages increase daily ad limit & reward\n• Buy from Packages page using balance\n• Starter ($1.1) to Ultimate ($30) available';
  else if(lc.includes('referral')||lc.includes('refer'))reply='👥 Referral help:\n• Share your referral link from Invite page\n• Earn 10% commission on referral deposits\n• Use Boost for 2x commissions (100 LP)';
  else if(lc.includes('kyc'))reply='🪪 KYC info:\n• Upload ID document in Profile\n• Admin reviews within 24h\n• Verified users get special perks';
  else reply='👋 Thank you for reaching out! Our support team will respond shortly. In the meantime, try the quick buttons below for instant answers.';
  let convo=getConvo(CU);
  convo.messages.push({from:'bot',text:reply,ts:Date.now(),type:'bot',status:'read'});
  convo.unread.user=(convo.unread.user||0)+1;
  saveConvo(CU,convo);renderChat();
}
function attachChatImage(){
  let inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{let f=inp.files[0];if(!f)return;let r=new FileReader();r.onload=ev=>{let convo=getConvo(CU);convo.messages.push({from:CU,text:'📷 Image',ts:Date.now(),type:'image',image:ev.target.result,status:'sent'});convo.unread.admin=(convo.unread.admin||0)+1;saveConvo(CU,convo);renderChat();addNotif('admin@ibs.com',`Image from ${getU().name}`,'📷');
  addNotif('zainab@ibs.com',`Image from ${getU().name}`,'📷');};r.readAsDataURL(f);};
  inp.click();
}
function renderChat(){
  let c=document.getElementById('chatMsgs');if(!c)return;
  let convo=getConvo(CU);let msgs=convo.messages||[];
  // Mark user messages as read
  let changed=false;msgs.forEach(m=>{if(m.from!=='user'&&m.from!==CU&&m.status!=='read'){m.status='read';changed=true;}});
  if(changed){convo.messages=msgs;convo.unread.user=0;saveConvo(CU,convo);}
  let html='';let lastDate='';
  msgs.forEach((m,i)=>{
    let d=new Date(m.ts).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'});
    if(d!==lastDate){html+=`<div class="chat-date-sep"><span>${d}</span></div>`;lastDate=d;}
    let cls=m.from===CU||m.from==='user'?'user':m.from==='bot'?'bot':m.type==='system'?'system':'admin';
    let statusIcon=m.status==='read'?'✓✓':m.status==='delivered'?'✓✓':'✓';
    let imgHtml=m.type==='image'&&m.image?`<img src="${m.image}" class="chat-img-preview" onclick="window.open(this.src)">`:'';
    html+=`<div class="chat-bubble ${cls}">${escHTML(m.text)}${imgHtml}<div class="chat-bubble-time">${fmtDate(m.ts)}${cls==='user'?' <span style=\"font-size:9px;\">'+statusIcon+'</span>':''}</div></div>`;
  });
  if(!msgs.length)html='<div style="text-align:center;padding:40px;color:var(--text2);"><div style="font-size:48px;margin-bottom:12px;">🎧</div><div>No messages yet</div><div style="font-size:12px;">Start a conversation with our support team</div></div>';
  c.innerHTML=html;c.scrollTop=c.scrollHeight;
}

function showChatRating(){
  let m=document.createElement('div');m.className='modal-overlay';
  m.innerHTML=`<div class="modal-box" style="text-align:center;"><h3>Rate Our Support</h3><p style="margin:12px 0;">How was your experience?</p><div class="chat-rating" id="chatRatingStars"><span onclick="submitRating(1)">⭐</span><span onclick="submitRating(2)">⭐</span><span onclick="submitRating(3)">⭐</span><span onclick="submitRating(4)">⭐</span><span onclick="submitRating(5)">⭐</span></div><div id="ratingFeedback" style="margin-top:12px;"></div><button class="btn-xs" onclick="this.closest('.modal-overlay').remove()" style="margin-top:12px;">Close</button></div>`;
  document.body.appendChild(m);
}
function submitRating(stars){
  document.querySelectorAll('#chatRatingStars span').forEach((s,i)=>s.classList.toggle('active',i<stars));
  let labels=['','😞 Poor','😐 Fair','🙂 Good','😊 Great','🤩 Excellent'];
  document.getElementById('ratingFeedback').innerHTML=`<div style="font-size:16px;margin:8px 0;">${labels[stars]}</div><textarea id="ratingText" class="form-input" rows="2" placeholder="Feedback (optional)"></textarea><button class="btn-primary-sm" onclick="submitFeedback(${stars})" style="margin-top:8px;">Submit</button>`;
}
function submitFeedback(stars){
  let text=document.getElementById('ratingText')?.value||'';
  let ratings=S.get('ibs_chat_ratings',[]);
  ratings.unshift({user:CU,stars,feedback:text,ts:new Date().toISOString()});
  S.set('ibs_chat_ratings',ratings);
  let convo=getConvo(CU);convo.messages.push({from:'system',text:`⭐ User rated support: ${stars}/5${text?' - "'+text+'"':''}`,ts:Date.now(),type:'system',status:'read'});saveConvo(CU,convo);
  addLog('Chat Rating',`${stars}/5 from ${CU}`);toast('Thank you for your feedback!');document.querySelector('.modal-overlay')?.remove();renderChat();
}
function exportChat(){
  let convo=getConvo(CU);let msgs=convo.messages||[];
  let text='IBS Support Chat Export\n=====================\n'+msgs.map(m=>`[${new Date(m.ts).toLocaleString()}] ${m.from===CU?'You':m.from==='bot'?'Bot':'Support'}: ${m.text}`).join('\n');
  let blob=new Blob([text],{type:'text/plain'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='chat_export.txt';a.click();toast('Chat exported');
}
function loadAdmin(){
  let tabs=['overview','users','withdrawals','payments','kyc','ads','tasks','packages','broadcast','support','settings','logs'];
  let tabLabels={overview:'📊 Overview',users:'👥 Users',withdrawals:'💸 Withdrawals',payments:'💰 Payments',kyc:'🪪 KYC',ads:'📺 Ads',tasks:'✅ Tasks',packages:'💎 Packages',broadcast:'📢 Broadcast',support:'🎧 Support',settings:'⚙️ Settings',logs:'📋 Logs'};
  document.getElementById('page-admin').innerHTML=`<div class="admin-tabs">${tabs.map(t=>`<button class="admin-tab${t==='overview'?' active':''}" data-tab="${t}" onclick="adminTab('${t}',this)">${tabLabels[t]}</button>`).join('')}</div><div id="adminContent"></div>`;
  _currentAdminTab='overview';loadAdminOverview();
}
function adminTab(tab,btn){
  _currentAdminTab=tab;
  document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  let loaders={overview:loadAdminOverview,users:loadAdminUsers,withdrawals:loadAdminWithdrawals,payments:loadAdminPayments,kyc:loadAdminKYC,ads:loadAdminAds,tasks:loadAdminTasks,packages:loadAdminPackages,broadcast:loadAdminBroadcast,support:loadAdminSupport,settings:loadAdminSettings,logs:loadAdminLogs};
  if(loaders[tab])loaders[tab]();
}
function refreshAdminTab(){
  let loaders={overview:loadAdminOverview,users:loadAdminUsers,withdrawals:loadAdminWithdrawals,payments:loadAdminPayments,kyc:loadAdminKYC,ads:loadAdminAds,tasks:loadAdminTasks,packages:loadAdminPackages,broadcast:loadAdminBroadcast,support:loadAdminSupport,settings:loadAdminSettings,logs:loadAdminLogs};
  if(loaders[_currentAdminTab])loaders[_currentAdminTab]();
}

// ====== OVERVIEW TAB ======
function loadAdminOverview(){
  let users=S.users();let all=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com');
  let totalDep=all.reduce((a,b)=>a+(b.totalDeposits||0),0);
  let totalBal=all.reduce((a,b)=>a+(b.balance||0),0);
  let totalEarn=all.reduce((a,b)=>a+(b.totalEarnings||0),0);
  let totalWD=S.wd().filter(w=>w.status==='approved').reduce((a,b)=>a+b.amount,0);
  let pendingWD=S.wd().filter(w=>w.status==='pending').length;
  let pendingKYC=all.filter(u=>u.kycStatus==='pending').length;
  let blocked=all.filter(u=>u.blocked).length;
  let today=new Date().toDateString();
  let newToday=all.filter(u=>new Date(u.joinDate).toDateString()===today).length;
  document.getElementById('adminContent').innerHTML=`
    <div class="grid g4" style="margin-bottom:20px;">
      <div class="stat-card"><div class="stat-icon cyan"><i class="fa fa-users"></i></div><div class="stat-label">Total Users</div><div class="stat-value">${all.length}</div><div style="font-size:11px;color:var(--green);">+${newToday} today</div></div>
      <div class="stat-card"><div class="stat-icon gold"><i class="fa fa-rupee-sign"></i></div><div class="stat-label">Total Deposits</div><div class="stat-value">${fmtMoney(totalDep)}</div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fa fa-wallet"></i></div><div class="stat-label">Total Balance</div><div class="stat-value">${fmtMoney(totalBal)}</div></div>
      <div class="stat-card"><div class="stat-icon orange"><i class="fa fa-chart-line"></i></div><div class="stat-label">Total Earned</div><div class="stat-value">${fmtMoney(totalEarn)}</div></div>
      <div class="stat-card"><div class="stat-icon cyan"><i class="fa fa-check-circle"></i></div><div class="stat-label">Approved WD</div><div class="stat-value">${fmtMoney(totalWD)}</div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fa fa-clock"></i></div><div class="stat-label">Pending WD</div><div class="stat-value">${pendingWD}</div></div>
      <div class="stat-card"><div class="stat-icon gold"><i class="fa fa-id-card"></i></div><div class="stat-label">Pending KYC</div><div class="stat-value">${pendingKYC}</div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fa fa-ban"></i></div><div class="stat-label">Blocked</div><div class="stat-value">${blocked}</div></div>
    </div>
    <div class="grid g2">
      <div class="card"><div class="sec-header"><h3>Revenue Overview</h3></div><canvas id="adminRevenueChart" height="200"></canvas></div>
      <div class="card"><div class="sec-header"><h3>User Growth</h3></div><canvas id="adminUserChart" height="200"></canvas></div>
    </div>
    <div class="card" style="margin-top:20px;"><div class="sec-header"><h3>Recent Activity</h3></div><div id="recentActivity"></div></div>`;
  let last7=[];for(let i=6;i>=0;i--){let d=new Date();d.setDate(d.getDate()-i);last7.push(d.toDateString());}
  let userCounts=last7.map(d=>all.filter(u=>new Date(u.joinDate).toDateString()===d).length);
  let depAmounts=last7.map(d=>all.reduce((a,u)=>{let txs=(u.transactions||[]).filter(t=>t.type==='deposit'&&new Date(t.ts).toDateString()===d);return a+txs.reduce((s,t)=>s+t.amount,0);},0));
  let chartOpts={responsive:true,plugins:{legend:{labels:{color:'#7a9ab8'}}},scales:{x:{ticks:{color:'#7a9ab8'},grid:{color:'#1e3354'}},y:{ticks:{color:'#7a9ab8'},grid:{color:'#1e3354'}}}};
  new Chart(document.getElementById('adminRevenueChart'),{type:'bar',data:{labels:last7.map(d=>new Date(d).toLocaleDateString('en-PK',{weekday:'short'})),datasets:[{label:'Deposits',data:depAmounts,backgroundColor:'rgba(0,229,255,0.3)',borderColor:'#00e5ff',borderWidth:1}]},options:chartOpts});
  new Chart(document.getElementById('adminUserChart'),{type:'line',data:{labels:last7.map(d=>new Date(d).toLocaleDateString('en-PK',{weekday:'short'})),datasets:[{label:'New Users',data:userCounts,borderColor:'#ffd700',backgroundColor:'rgba(255,215,0,0.1)',fill:true,tension:.4}]},options:chartOpts});
  let logs=S.logs().slice(0,10);
  document.getElementById('recentActivity').innerHTML=logs.length?logs.map(l=>`<div class="tx-item"><div class="tx-icon in"><i class="fa fa-circle"></i></div><div>${escHTML(l.action)}${l.details?' - '+escHTML(l.details):''}</div><div style="font-size:11px;color:var(--text2);">${fmtDate(l.ts)}</div></div>`).join(''):'<div style="padding:20px;text-align:center;color:var(--text2);">No recent activity</div>';
}

// ====== USERS TAB ======
function loadAdminUsers(){
  let users=S.users();let all=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com');
  document.getElementById('adminContent').innerHTML=`
    <div class="card"><div class="sec-header"><h3>User Management</h3><div><input type="text" id="adminUserSearch" class="form-input" style="width:250px;display:inline-block;" placeholder="Search name/email..." oninput="filterAdminUsers()"></div></div>
    <div class="filter-row">
      <button class="btn-xs admin-filter active" onclick="setUserFilter('all',this)">All (${all.length})</button>
      <button class="btn-xs admin-filter" onclick="setUserFilter('active',this)">Active</button>
      <button class="btn-xs admin-filter" onclick="setUserFilter('blocked',this)">Blocked</button>
      <button class="btn-xs admin-filter" onclick="setUserFilter('verified',this)">Verified</button>
      <button class="btn-xs admin-filter" onclick="setUserFilter('pending_kyc',this)">Pending KYC</button>
      <button class="btn-xs" onclick="exportUsersCSV()" style="margin-left:auto;"><i class="fa fa-download"></i> Export CSV</button>
    </div>
    <div id="adminUserTable"></div></div>`;
  window._adminUserFilter='all';filterAdminUsers();
}
function setUserFilter(f,btn){window._adminUserFilter=f;document.querySelectorAll('.admin-filter').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');filterAdminUsers();}
function filterAdminUsers(){
  let users=S.users();let all=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com');
  let search=(document.getElementById('adminUserSearch')?.value||'').toLowerCase();
  let filter=window._adminUserFilter||'all';
  let filtered=all.filter(u=>{
    if(search&&!u.name.toLowerCase().includes(search)&&!u.email.toLowerCase().includes(search))return false;
    if(filter==='active')return !u.blocked;if(filter==='blocked')return u.blocked;
    if(filter==='verified')return u.verified;if(filter==='pending_kyc')return u.kycStatus==='pending';return true;
  });
  document.getElementById('adminUserTable').innerHTML=`
    <table class="admin-table"><thead><tr><th>User</th><th>Email</th><th>Balance</th><th>Level</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${filtered.map(u=>`<tr><td><span style="font-size:20px;">${u.avatar}</span> ${nm(u.name,u.verified,'sm')}</td><td style="font-size:12px;">${u.email}</td><td>${fmtMoney(u.balance)}</td><td>Lv.${u.level}</td>
    <td>${u.blocked?'<span class="badge badge-red">Blocked</span>':''}${u.verified?'<span class="badge badge-cyan"><i class="fa fa-check-circle"></i> Verified</span>':''}${u.kycStatus==='pending'?'<span class="badge badge-orange">KYC</span>':''}${!u.blocked&&!u.verified&&u.kycStatus!=='pending'?'<span class="badge badge-cyan">Active</span>':''}</td>
    <td><button class="btn-xs" onclick="openUserModal('${u.email}')"><i class="fa fa-eye"></i></button> <button class="btn-xs" onclick="adminToggleBlock('${u.email}')" style="color:${u.blocked?'var(--green)':'var(--red)'}"><i class="fa ${u.blocked?'fa-unlock':'fa-ban'}"></i></button></td></tr>`).join('')}</tbody></table>
    <div style="margin-top:12px;font-size:12px;color:var(--text2);">Showing ${filtered.length} of ${all.length} users</div>`;
}
function exportUsersCSV(){
  let users=S.users();let all=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com');
  let csv='Name,Email,Balance,Level,Verified,Blocked,KYC,Deposits,Earnings\n';
  all.forEach(u=>{csv+=`"${u.name}","${u.email}",${u.balance},${u.level},${u.verified},${u.blocked},${u.kycStatus},${u.totalDeposits||0},${u.totalEarnings||0}\n`;});
  let blob=new Blob([csv],{type:'text/csv'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ibs_users.csv';a.click();
  addLog('Export Users CSV');toast('CSV exported');
}

      <div>WhatsApp: ${u.wa||'N/A'} | Referral Code: ${u.referralCode||'N/A'}</div>
      <div>Team Size: ${u.teamCount||0} | Package: ${u.activePackage?.name||'None'}</div>

    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;">
      <button class="btn-xs" onclick="adminAdjustBalance('${email}')"><i class="fa fa-rupee-sign"></i> Adjust Balance</button>
      <button class="btn-xs" onclick="adminToggleBlock('${email}')">${u.blocked?'<i class="fa fa-unlock"></i> Unblock':'<i class="fa fa-ban"></i> Block'}</button>

      <button class="btn-xs" onclick="adminSetLevel('${email}')"><i class="fa fa-layer-group"></i> Set Level</button>
      <button class="btn-xs" onclick="adminAddLoyalty('${email}')"><i class="fa fa-star"></i> Add Loyalty</button>
      <button class="btn-xs" onclick="adminViewTransactions('${email}')"><i class="fa fa-history"></i> Transactions</button>
      <button class="btn-xs" onclick="adminDeleteUser('${email}')" style="color:var(--red);"><i class="fa fa-trash"></i> Delete</button>

function adminAdjustBalance(email){let amt=parseFloat(prompt('Amount (+/-)'));if(isNaN(amt))return;let users=S.users();users[email].balance+=amt;if(amt>0)users[email].totalEarnings+=amt;addTx(users[email],'admin_adjust',amt,`Admin ${amt>=0?'added':'deducted'} ${fmtMoney(Math.abs(amt))}`);S.saveUsers(users);addLog('Balance Adjusted',`${email} ${amt>=0?'+':''}${fmtMoney(amt)}`);toast('Balance updated');document.querySelector('.modal-overlay')?.remove();}
function adminToggleBlock(email){let users=S.users();users[email].blocked=!users[email].blocked;S.saveUsers(users);addNotif(email,users[email].blocked?'Your account has been blocked':'Your account has been unblocked',users[email].blocked?'🚫':'✅');addLog(users[email].blocked?'User Blocked':'User Unblocked',email);toast('Updated');document.querySelector('.modal-overlay')?.remove();refreshAdminTab();}
function adminToggleVerify(email){let users=S.users();users[email].verified=!users[email].verified;S.saveUsers(users);addNotif(email,users[email].verified?'Congratulations! You have been verified! 🎉':'Your verification has been removed',users[email].verified?'✅':'⚠️');addLog(users[email].verified?'Blue Tick Added':'Blue Tick Removed',email);toast(users[email].verified?'Blue tick granted!':'Blue tick removed');if(email===CU)document.getElementById('topName').innerHTML=nm(users[CU].displayName||users[CU].name,users[CU].verified,'sm');document.querySelector('.modal-overlay')?.remove();refreshAdminTab();}
function adminResetPass(email){let np=prompt('New password');if(np&&np.length>=6){let users=S.users();users[email].password=np;S.saveUsers(users);addLog('Password Reset',email);toast('Password reset');}else if(np)toast('Min 6 chars','error');}
function adminSetLevel(email){let level=parseInt(prompt('Set level (1-10):'));if(level>=1&&level<=10){let users=S.users();users[email].level=level;S.saveUsers(users);addLog('Level Set',`${email} → Lv.${level}`);toast('Level updated');document.querySelector('.modal-overlay')?.remove();}else if(!isNaN(level))toast('Level 1-10','error');}
function adminAddLoyalty(email){let pts=parseInt(prompt('Add loyalty points:'));if(pts>0){let users=S.users();users[email].loyaltyPoints=(users[email].loyaltyPoints||0)+pts;S.saveUsers(users);addLog('Loyalty Added',`${email} +${pts}LP`);toast('Loyalty added');}}
function adminViewTransactions(email){
  let u=S.users()[email];if(!u)return;let txs=(u.transactions||[]).slice().reverse().slice(0,30);
  let m=document.createElement('div');m.className='modal-overlay';
  m.innerHTML=`<div class="modal-box"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;"><h3>Transactions - ${nm(u.name,u.verified,'sm')}</h3><button class="btn-xs" onclick="this.closest('.modal-overlay').remove()">✕</button></div>
  ${txs.length?`<table class="admin-table"><thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Desc</th></tr></thead><tbody>${txs.map(t=>`<tr><td style="font-size:11px;">${fmtDate(t.ts)}</td><td>${t.type}</td><td style="color:${t.amount>0?'var(--green)':'var(--red)'}">${t.amount>0?'+':''}${fmtMoney(t.amount)}</td><td style="font-size:12px;">${escHTML(t.desc||'')}</td></tr>`).join('')}</tbody></table>`:'<div style="text-align:center;padding:20px;color:var(--text2);">No transactions</div>'}</div>`;
  document.body.appendChild(m);
}
function adminDeleteUser(email){if(!confirm(`Delete user ${email}? This cannot be undone!`))return;let users=S.users();delete users[email];S.saveUsers(users);addLog('User Deleted',email);toast('User deleted');document.querySelector('.modal-overlay')?.remove();refreshAdminTab();}

function loadAdminWithdrawals(){
  let wds=S.wd();
  document.getElementById('adminContent').innerHTML=`
    <div class="card"><div class="sec-header"><h3>Withdrawal Management</h3></div>
    <div class="filter-row">
      <button class="btn-xs admin-wd-filter active" onclick="filterAdminWd('all',this)">All (${wds.length})</button>
      <button class="btn-xs admin-wd-filter" onclick="filterAdminWd('pending',this)">Pending (${wds.filter(w=>w.status==='pending').length})</button>
      <button class="btn-xs admin-wd-filter" onclick="filterAdminWd('approved',this)">Approved</button>
      <button class="btn-xs admin-wd-filter" onclick="filterAdminWd('rejected',this)">Rejected</button>
      <button class="btn-xs" onclick="approveAllPending()" style="margin-left:auto;background:rgba(0,230,118,0.1);color:var(--green);"><i class="fa fa-check-double"></i> Approve All Pending</button>
    </div>
    <div id="adminWdTable"></div></div>`;
  window._adminWdFilter='all';filterAdminWd('all');
}
function filterAdminWd(status,btn){
  if(btn){window._adminWdFilter=status;document.querySelectorAll('.admin-wd-filter').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  let wds=S.wd();let filtered=(window._adminWdFilter||'all')==='all'?wds:wds.filter(w=>w.status===(window._adminWdFilter||status));
  document.getElementById('adminWdTable').innerHTML=filtered.length?`
    <table class="admin-table"><thead><tr><th>User</th><th>Amount</th><th>Method</th><th>Account</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${filtered.map(w=>{let wu=S.users()[w.userId];return `<tr><td>${wu?nm(w.userName,wu.verified,'sm'):escHTML(w.userName)}</td><td>${fmtMoney(w.amount)}</td><td>${w.method}</td><td style="font-size:11px;">${escHTML(w.account||'')}</td><td style="font-size:11px;">${fmtDate(w.ts)}</td>
    <td><span class="badge badge-${w.status==='approved'?'green':w.status==='rejected'?'red':'orange'}">${w.status}</span></td>
    <td>${w.status==='pending'?`<button class="btn-xs" style="color:var(--green);" onclick="approveWd('${w.id}')"><i class="fa fa-check"></i></button> <button class="btn-xs" style="color:var(--red);" onclick="rejectWd('${w.id}')"><i class="fa fa-times"></i></button>`:'-'}</td></tr>`}).join('')}</tbody></table>`
    :'<div style="text-align:center;padding:40px;color:var(--text2);">No withdrawals found</div>';
}
function approveAllPending(){if(!confirm('Approve all pending withdrawals?'))return;let wds=S.wd();let count=0;wds.forEach(w=>{if(w.status==='pending'){w.status='approved';addNotif(w.userId,`Withdrawal of ${fmtMoney(w.amount)} approved!`,'✅');count++;}});S.saveWd(wds);addLog('Bulk Approve WD',`${count} withdrawals`);toast(`${count} approved`);filterAdminWd('all');}
function approveWd(id){let wds=S.wd();let idx=wds.findIndex(w=>w.id===id);if(idx===-1)return;wds[idx].status='approved';S.saveWd(wds);addNotif(wds[idx].userId,`Withdrawal of ${fmtMoney(wds[idx].amount)} approved!`,'✅');addLog('WD Approved',`${wds[idx].userName} ${fmtMoney(wds[idx].amount)}`);toast('Approved');refreshAdminTab();}
function rejectWd(id){let wds=S.wd();let idx=wds.findIndex(w=>w.id===id);if(idx===-1)return;let w=wds[idx];w.status='rejected';S.saveWd(wds);let users=S.users();if(users[w.userId]){users[w.userId].balance+=w.amount;addTx(users[w.userId],'refund',w.amount,'Withdrawal rejected refund');S.saveUsers(users);}addLog('WD Rejected',`${w.userName} ${fmtMoney(w.amount)}`);toast('Rejected & refunded');refreshAdminTab();}

function loadAdminPayments(){
  let p=S.pending();
  document.getElementById('adminContent').innerHTML=`
    <div class="card"><div class="sec-header"><h3>Payment Requests</h3></div>
    <div class="filter-row">
      <button class="btn-xs admin-pay-filter active" onclick="filterAdminPay('all',this)">All (${p.length})</button>
      <button class="btn-xs admin-pay-filter" onclick="filterAdminPay('pending',this)">Pending (${p.filter(x=>x.status==='pending').length})</button>
      <button class="btn-xs admin-pay-filter" onclick="filterAdminPay('approved',this)">Approved</button>
      <button class="btn-xs admin-pay-filter" onclick="filterAdminPay('rejected',this)">Rejected</button>
    </div>
    <div id="adminPayTable"></div></div>`;
  window._adminPayFilter='all';filterAdminPay('all');
}
function filterAdminPay(status,btn){
  if(btn){window._adminPayFilter=status;document.querySelectorAll('.admin-pay-filter').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
  let p=S.pending();let filtered=window._adminPayFilter==='all'?p:p.filter(x=>x.status===window._adminPayFilter);
  document.getElementById('adminPayTable').innerHTML=filtered.length?`
    <table class="admin-table"><thead><tr><th>User</th><th>Package</th><th>Amount</th><th>Method</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${filtered.map(x=>{let u=S.users()[x.userEmail];return `<tr><td>${nm(x.userName,u?u.verified:false,'sm')}</td><td>${x.packageName}</td><td>${fmtMoney(x.amount)}</td><td>${x.method}</td><td style="font-size:11px;">${fmtDate(x.ts)}</td>
    <td><span class="badge badge-${x.status==='approved'?'green':x.status==='rejected'?'red':'orange'}">${x.status}</span></td>
    <td>${x.status==='pending'?`<button class="btn-xs" style="color:var(--green);" onclick="approvePay('${x.id}')"><i class="fa fa-check"></i></button> <button class="btn-xs" style="color:var(--red);" onclick="rejectPay('${x.id}')"><i class="fa fa-times"></i></button>`:'-'}</td></tr>`}).join('')}</tbody></table>`
    :'<div style="text-align:center;padding:40px;color:var(--text2);">No payments found</div>';
}
function approvePay(id){let p=S.pending();let idx=p.findIndex(x=>x.id===id);if(idx===-1)return;p[idx].status='approved';S.savePending(p);let u=S.users()[p[idx].userEmail];if(u){if(!u.packageHistory)u.packageHistory=[];u.packageHistory.push({name:p[idx].packageName,price:p[idx].amount,ts:new Date().toISOString()});S.saveUsers({...S.users(),[p[idx].userEmail]:u});}addNotif(p[idx].userEmail,`Payment for ${p[idx].packageName} approved!`,'✅');addLog('Payment Approved',`${p[idx].userName} ${p[idx].packageName}`);toast('Approved');refreshAdminTab();}
function rejectPay(id){let p=S.pending();let idx=p.findIndex(x=>x.id===id);if(idx===-1)return;p[idx].status='rejected';S.savePending(p);addNotif(p[idx].userEmail,`Payment for ${p[idx].packageName} rejected`,'❌');addLog('Payment Rejected',`${p[idx].userName} ${p[idx].packageName}`);toast('Rejected');refreshAdminTab();}

// ====== KYC TAB ======
function loadAdminKYC(){
  let users=S.users();
  let pending=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com'&&u.kycStatus==='pending');
  let approved=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com'&&u.kycStatus==='approved');
  let rejected=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com'&&u.kycStatus==='rejected');
  document.getElementById('adminContent').innerHTML=`
    <div class="grid g3" style="margin-bottom:16px;">
      <div class="stat-card"><div class="stat-icon orange"><i class="fa fa-hourglass-half"></i></div><div class="stat-label">Pending</div><div class="stat-value">${pending.length}</div></div>
      <div class="stat-card"><div class="stat-icon green"><i class="fa fa-check"></i></div><div class="stat-label">Approved</div><div class="stat-value">${approved.length}</div></div>
      <div class="stat-card"><div class="stat-icon red"><i class="fa fa-times"></i></div><div class="stat-label">Rejected</div><div class="stat-value">${rejected.length}</div></div>
    </div>
    <div class="card"><div class="sec-header"><h3>Pending KYC Submissions</h3></div>
    ${pending.length?pending.map(u=>`<div class="tx-item"><div class="tx-icon in"><i class="fa fa-user"></i></div>
      <div><div>${u.avatar} ${nm(u.name,u.verified,'sm')}</div><div style="font-size:11px;color:var(--text2);">${u.email} | Joined ${fmtDate(u.joinDate)}</div></div>
      <div style="margin-left:auto;display:flex;gap:8px;"><button class="btn-xs" onclick="viewKYC('${u.email}')" style="color:var(--primary);"><i class="fa fa-eye"></i> View</button>
      <button class="btn-xs" onclick="approveKYC('${u.email}')" style="color:var(--green);"><i class="fa fa-check"></i></button>
      <button class="btn-xs" onclick="rejectKYC('${u.email}')" style="color:var(--red);"><i class="fa fa-times"></i></button></div></div>`).join(''):'<div style="text-align:center;padding:40px;color:var(--text2);">No pending KYC submissions</div>'}</div>`;
}
function viewKYC(email){let u=S.users()[email];if(!u)return;if(u.kycImage){let m=document.createElement('div');m.className='modal-overlay';m.innerHTML=`<div class="modal-box" style="text-align:center;"><h3>KYC - ${nm(u.name,u.verified,'sm')}</h3><img src="${u.kycImage}" style="max-width:100%;border-radius:12px;margin:16px 0;"><br><button class="btn-xs" onclick="this.closest('.modal-overlay').remove()">Close</button></div>`;document.body.appendChild(m);}else toast('No KYC document','error');}
function approveKYC(email){let users=S.users();users[email].kycStatus='approved';users[email].verified=true;S.saveUsers(users);addNotif(email,'Your KYC has been approved!','✅');addLog('KYC Approved',email);toast('KYC approved');loadAdminKYC();}
function rejectKYC(email){let reason=prompt('Rejection reason:');let users=S.users();users[email].kycStatus='rejected';S.saveUsers(users);addNotif(email,`KYC rejected${reason?': '+reason:''}`,'❌');addLog('KYC Rejected',email+(reason?' - '+reason:''));toast('KYC rejected');loadAdminKYC();}

function loadAdminBroadcast(){
  document.getElementById('adminContent').innerHTML=`
    <div class="grid g2">
    <div class="card"><div class="sec-header"><h3>Broadcast Message</h3></div>
      <div style="margin-bottom:12px;"><input type="text" id="broadcastTitle" class="form-input" placeholder="Title (optional)"></div>
      <div style="margin-bottom:12px;"><textarea id="broadcastMsg" class="form-input" rows="4" placeholder="Type your message..."></textarea></div>
      <div style="margin-bottom:12px;"><select id="broadcastTarget" class="form-input"><option value="all">All Users</option><option value="active">Active Users</option><option value="blocked">Blocked Users</option><option value="verified">Verified Users</option></select></div>
      <button class="btn-primary-sm" onclick="sendBroadcast()"><i class="fa fa-paper-plane"></i> Send Broadcast</button>
    </div>
    <div class="card"><div class="sec-header"><h3>Quick Templates</h3></div>
      <button class="btn-xs" style="width:100%;margin:6px 0;text-align:left;" onclick="quickBroadcast('maintenance')">🔧 Maintenance Notice</button>
      <button class="btn-xs" style="width:100%;margin:6px 0;text-align:left;" onclick="quickBroadcast('update')">🆕 New Feature Update</button>
      <button class="btn-xs" style="width:100%;margin:6px 0;text-align:left;" onclick="quickBroadcast('bonus')">🎁 Bonus Event</button>
      <button class="btn-xs" style="width:100%;margin:6px 0;text-align:left;" onclick="quickBroadcast('warning')">⚠️ Warning Notice</button>
      <button class="btn-xs" style="width:100%;margin:6px 0;text-align:left;" onclick="quickBroadcast('holiday')">🎉 Holiday Greeting</button>
      <div style="margin-top:16px;"><h4>History</h4><div id="broadcastHistory"></div></div>
    </div></div>`;
  let history=S.get('ibs_broadcasts',[]);
  document.getElementById('broadcastHistory').innerHTML=history.length?history.slice(0,10).map(b=>`<div class="tx-item"><div class="tx-icon in"><i class="fa fa-bullhorn"></i></div><div><div>${escHTML(b.msg.substring(0,50))}</div><div style="font-size:11px;color:var(--text2);">${fmtDate(b.ts)} → ${b.target} (${b.count})</div></div></div>`).join(''):'<div style="color:var(--text2);padding:12px;">No broadcasts sent</div>';
}
function sendBroadcast(){
  let title=document.getElementById('broadcastTitle').value.trim();let msg=document.getElementById('broadcastMsg').value.trim();let target=document.getElementById('broadcastTarget').value;
  if(!msg){toast('Enter message','error');return;}
  let users=S.users();let all=Object.values(users).filter(u=>u.email!=='admin@ibs.com'&&u.email!=='zainab@ibs.com');
  let targets=all.filter(u=>{if(target==='all')return true;if(target==='active')return !u.blocked;if(target==='blocked')return u.blocked;if(target==='verified')return u.verified;return false;});
  let fullMsg=title?`${title}: ${msg}`:msg;
  targets.forEach(u=>addNotif(u.email,fullMsg,'📢'));
  let history=S.get('ibs_broadcasts',[]);history.unshift({msg:fullMsg,target,ts:new Date().toISOString(),count:targets.length});
  S.set('ibs_broadcasts',history);addLog('Broadcast Sent',`To ${targets.length} users`);toast(`Sent to ${targets.length} users`,'success');loadAdminBroadcast();
}
function quickBroadcast(type){let templates={maintenance:'🔧 Scheduled maintenance tonight. Services may be temporarily unavailable.',update:'🆕 New features have been added! Check out the latest updates.',bonus:'🎁 Special bonus event! Double rewards for the next 24 hours!',warning:'⚠️ Important: Please verify your account to avoid suspension.',holiday:'🎉 Happy holidays! Enjoy special rewards and bonuses!'};document.getElementById('broadcastMsg').value=templates[type]||'';}

// ====== SUPPORT TAB ======
let _adminChatPoll=null;let _selectedConvo=null;
function loadAdminSupport(){
  if(_adminChatPoll)clearInterval(_adminChatPoll);
  let allConvos=getAllConvos();
  let totalUnread=allConvos.reduce((a,c)=>a+(c.unread?.admin||0),0);
  document.getElementById('adminContent').innerHTML=`
    <div class="card" style="padding:0;">
      <div class="admin-chat-layout">
        <div class="admin-chat-sidebar">
          <div class="admin-chat-sidebar-header">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;"><h4>Conversations</h4>${totalUnread?`<span class="admin-convo-unread">${totalUnread}</span>`:''}</div>
            <input type="text" id="convoSearch" class="form-input" placeholder="Search users..." oninput="filterConvos()">
            <div style="display:flex;gap:4px;margin-top:8px;"><button class="btn-xs active" id="convoFilterAll" onclick="filterConvoStatus('all',this)">All</button><button class="btn-xs" id="convoFilterOpen" onclick="filterConvoStatus('open',this)">Open</button><button class="btn-xs" id="convoFilterUnread" onclick="filterConvoStatus('unread',this)">Unread</button><button class="btn-xs" id="convoFilterResolved" onclick="filterConvoStatus('resolved',this)">Resolved</button></div>
          </div>
          <div id="convoList"></div>
        </div>
        <div class="admin-chat-main" id="adminChatMain">
          <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text2);flex-direction:column;"><div style="font-size:48px;margin-bottom:12px;">🎧</div><div>Select a conversation to view messages</div></div>
        </div>
      </div>
    </div>`;
  window._convoFilter='all';
  renderConvoList();
  if(_selectedConvo)openAdminConvo(_selectedConvo);
  _adminChatPoll=setInterval(()=>{if(document.getElementById('convoList'))renderConvoList();if(_selectedConvo&&document.getElementById('adminChatMsgs'))openAdminConvo(_selectedConvo);},4000);
}
function getAllConvos(){
  let msgs=S.msgs();let users=S.users();
  return Object.keys(msgs).filter(k=>k!=='admin@ibs.com'&&k!=='zainab@ibs.com'&&users[k]).map(k=>{
    let c=msgs[k];let convo=Array.isArray(c)?{status:'open',unread:{admin:c.filter(m=>m.from!=='bot'&&m.from!=='admin@ibs.com'&&m.from!=='zainab@ibs.com').length,user:c.filter(m=>m.from==='admin@ibs.com'||m.from==='zainab@ibs.com'||m.from==='bot').length},messages:c}:c;
    let lastMsg=convo.messages.length?convo.messages[convo.messages.length-1]:null;
    return{email:k,name:users[k].name,avatar:users[k].avatar,verified:users[k].verified,status:convo.status,unread:convo.unread||{admin:0,user:0},lastMsg:lastMsg?lastMsg.text:'',lastTs:lastMsg?lastMsg.ts:0,msgCount:convo.messages.length};
  }).sort((a,b)=>b.lastTs-a.lastTs);
}
function renderConvoList(){
  let convos=getAllConvos();let search=(document.getElementById('convoSearch')?.value||'').toLowerCase();
  let filter=window._convoFilter||'all';
  convos=convos.filter(c=>{
    if(search&&!c.name.toLowerCase().includes(search)&&!c.email.toLowerCase().includes(search))return false;
    if(filter==='open')return c.status==='open';if(filter==='unread')return(c.unread?.admin||0)>0;if(filter==='resolved')return c.status==='resolved';return true;
  });
  document.getElementById('convoList').innerHTML=convos.length?convos.map(c=>`
    <div class="admin-convo-item${_selectedConvo===c.email?' active':''}" onclick="openAdminConvo('${c.email}')">
      <div style="font-size:24px;">${c.avatar}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;"><strong style="font-size:13px;">${nm(c.name,c.verified,'sm')}</strong><span style="font-size:10px;color:var(--text2);">${c.lastTs?fmtDate(c.lastTs):''}</span></div>
        <div style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHTML(c.lastMsg?.substring(0,40)||'No messages')}</div>
      </div>
      ${c.unread?.admin?`<span class="admin-convo-unread">${c.unread.admin}</span>`:''}
      ${c.status==='resolved'?'<span style="font-size:10px;color:var(--green);">✓</span>':''}
    </div>`).join(''):'<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">No conversations</div>';
}
function filterConvos(){renderConvoList();}
function filterConvoStatus(f,btn){window._convoFilter=f;document.querySelectorAll('.admin-chat-sidebar-header .btn-xs').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderConvoList();}
function openAdminConvo(email){
  _selectedConvo=email;
  let users=S.users();let u=users[email];if(!u)return;
  let convo=getConvo(email);let msgs=convo.messages||[];
  // Mark admin as having read
  convo.unread.admin=0;msgs.forEach(m=>{if(m.status!=='read')m.status='read';});convo.messages=msgs;saveConvo(email,convo);
  renderConvoList();
  let ratings=S.get('ibs_chat_ratings',[]).filter(r=>r.user===email);
  let lastRating=ratings.length?ratings[0]:null;
  document.getElementById('adminChatMain').innerHTML=`
    <div class="chat-header">
      <div class="chat-agent-info"><div class="chat-avatar-sm">${u.avatar}</div><div><div class="chat-agent-name">${nm(u.name,u.verified,'sm')}</div><div style="font-size:11px;color:var(--text2);">${email} | Lv.${u.level} | ${fmtMoney(u.balance)}${lastRating?' | ⭐ '+lastRating.stars+'/5':''}</div></div></div>
      <div style="display:flex;gap:6px;">
        <button class="btn-xs" onclick="adminMarkResolved('${email}')" style="color:var(--green);"><i class="fa fa-check"></i> Resolve</button>
        <button class="btn-xs" onclick="adminMarkOpen('${email}')" style="color:var(--orange);"><i class="fa fa-redo"></i> Reopen</button>
        <button class="btn-xs" onclick="adminDeleteConvo('${email}')" style="color:var(--red);"><i class="fa fa-trash"></i></button>
      </div>
    </div>
    <div class="chat-msgs" id="adminChatMsgs" style="flex:1;overflow-y:auto;padding:16px;"></div>
    <div class="chat-quick" style="border-top:1px solid var(--border);">
      <button onclick="adminQuickReply('${email}','We are looking into your issue.')">🔍 Investigating</button>
      <button onclick="adminQuickReply('${email}','Your issue has been resolved. Thank you!')">✅ Resolved</button>
      <button onclick="adminQuickReply('${email}','Please allow 24 hours for processing.')">⏳ 24h Wait</button>
      <button onclick="adminQuickReply('${email}','Your withdrawal has been approved!')">💸 WD Approved</button>
      <button onclick="adminQuickReply('${email}','Please complete your KYC verification.')">🪪 KYC Needed</button>
      <button onclick="adminQuickReply('${email}','Thank you for contacting support!')">👋 Thanks</button>
    </div>
    <div class="chat-input-area">
      <button class="chat-icon-btn" onclick="adminAttachImage('${email}')"><i class="fa fa-image"></i></button>
      <input type="text" id="adminChatInp" placeholder="Reply to ${escHTML(u.name)}..." onkeydown="if(event.key==='Enter')adminSendReply('${email}')">
      <button class="chat-send-btn" onclick="adminSendReply('${email}')"><i class="fa fa-paper-plane"></i></button>
    </div>`;
  renderAdminChatMsgs(email);
}
function renderAdminChatMsgs(email){
  let c=document.getElementById('adminChatMsgs');if(!c)return;
  let convo=getConvo(email);let msgs=convo.messages||[];
  let html='';let lastDate='';
  msgs.forEach(m=>{
    let d=new Date(m.ts).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'});
    if(d!==lastDate){html+=`<div class="chat-date-sep"><span>${d}</span></div>`;lastDate=d;}
    let cls=m.from===email||m.from==='user'?'admin':m.from==='bot'?'bot':m.type==='system'?'system':'user';
    let imgHtml=m.type==='image'&&m.image?`<img src="${m.image}" class="chat-img-preview" onclick="window.open(this.src)">`:'';
    html+=`<div class="chat-bubble ${cls}">${escHTML(m.text)}${imgHtml}<div class="chat-bubble-time">${fmtDate(m.ts)}</div></div>`;
  });
  if(!msgs.length)html='<div style="text-align:center;padding:40px;color:var(--text2);">No messages yet</div>';
  c.innerHTML=html;c.scrollTop=c.scrollHeight;
}
function adminSendReply(email){
  let inp=document.getElementById('adminChatInp');if(!inp||!inp.value.trim())return;
  let text=inp.value.trim();inp.value='';
  let convo=getConvo(email);
  convo.messages.push({from:'admin@ibs.com',text,ts:Date.now(),type:'text',status:'sent'});
  convo.unread.user=(convo.unread.user||0)+1;
  saveConvo(email,convo);
  addNotif(email,`Support: ${text}`,'💬');
  addLog('Admin Reply',`To ${email}`);
  renderAdminChatMsgs(email);renderConvoList();
}
function adminQuickReply(email,text){
  let convo=getConvo(email);
  convo.messages.push({from:'admin@ibs.com',text,ts:Date.now(),type:'text',status:'sent'});
  convo.unread.user=(convo.unread.user||0)+1;
  saveConvo(email,convo);addNotif(email,`Support: ${text}`,'💬');addLog('Admin Quick Reply',`To ${email}`);
  renderAdminChatMsgs(email);renderConvoList();
}
function adminAttachImage(email){
  let inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{let f=inp.files[0];if(!f)return;let r=new FileReader();r.onload=ev=>{let convo=getConvo(email);convo.messages.push({from:'admin@ibs.com',text:'📷 Image',ts:Date.now(),type:'image',image:ev.target.result,status:'sent'});convo.unread.user=(convo.unread.user||0)+1;saveConvo(email,convo);addNotif(email,'Support sent an image','📷');renderAdminChatMsgs(email);};r.readAsDataURL(f);};
  inp.click();
}
function adminMarkResolved(email){let convo=getConvo(email);convo.status='resolved';convo.messages.push({from:'system',text:'Conversation marked as resolved',ts:Date.now(),type:'system',status:'read'});saveConvo(email,convo);addNotif(email,'Your support ticket has been resolved. Thank you!','✅');addLog('Convo Resolved',email);toast('Marked resolved');openAdminConvo(email);}
function adminMarkOpen(email){let convo=getConvo(email);convo.status='open';convo.messages.push({from:'system',text:'Conversation reopened',ts:Date.now(),type:'system',status:'read'});saveConvo(email,convo);addLog('Convo Reopened',email);toast('Reopened');openAdminConvo(email);}
function adminDeleteConvo(email){if(!confirm('Delete conversation with '+email+'?'))return;let msgs=S.msgs();delete msgs[email];S.saveMsgs(msgs);_selectedConvo=null;addLog('Convo Deleted',email);toast('Conversation deleted');loadAdminSupport();}

// ====== SETTINGS TAB ======
function loadAdminSettings(){
  let settings=S.get('ibs_platform_settings',{wdMin:5,wdFee:0,wdAutoApprove:10,refCommission:0.1,maintenanceMode:false});
  document.getElementById('adminContent').innerHTML=`
    <div class="grid g2">
    <div class="card"><div class="sec-header"><h3>Withdrawal Settings</h3></div>
      <div class="admin-form-row"><label style="min-width:140px;">Min Withdrawal ($):</label><input type="number" id="setWdMin" class="form-input" value="${settings.wdMin}" style="max-width:100px;"></div>
      <div class="admin-form-row"><label style="min-width:140px;">Withdrawal Fee ($):</label><input type="number" id="setWdFee" class="form-input" value="${settings.wdFee}" step="0.01" style="max-width:100px;"></div>
      <div class="admin-form-row"><label style="min-width:140px;">Auto-approve ≤ ($):</label><input type="number" id="setWdAuto" class="form-input" value="${settings.wdAutoApprove}" style="max-width:100px;"></div>
      <div class="admin-form-row"><label style="min-width:140px;">Referral Commission:</label><input type="number" id="setRefComm" class="form-input" value="${settings.refCommission}" step="0.01" style="max-width:100px;"></div>
      <button class="btn-primary-sm" onclick="saveAdminSettings()" style="margin-top:12px;">Save Settings</button>
    </div>
    <div class="card"><div class="sec-header"><h3>Platform Settings</h3></div>
      <div class="admin-form-row"><label style="min-width:140px;">Maintenance Mode:</label><button class="btn-xs" onclick="toggleMaintenance()">${settings.maintenanceMode?'🔴 Enabled':'🟢 Disabled'}</button></div>
      <div style="margin-top:16px;"><h4>Edit Agreement/Terms Message</h4><textarea id="adminMsgEdit" class="form-input" rows="6" style="margin-top:8px;">${escHTML(S.adminMsg())}</textarea><button class="btn-primary-sm" onclick="saveAdminMsg()" style="margin-top:8px;">Save Message</button></div>
    </div></div>
    <div class="card" style="margin-top:20px;"><div class="sec-header"><h3 style="color:var(--red);">⚠️ Danger Zone</h3></div>
      <div class="admin-form-row"><button class="btn-xs" onclick="resetAllData()" style="color:var(--red);border-color:var(--red);"><i class="fa fa-exclamation-triangle"></i> Reset All Platform Data</button><button class="btn-xs" onclick="clearAllLogs()"><i class="fa fa-trash"></i> Clear All Logs</button></div>
    </div>`;
}
function saveAdminSettings(){let settings={wdMin:parseFloat(document.getElementById('setWdMin').value)||5,wdFee:parseFloat(document.getElementById('setWdFee').value)||0,wdAutoApprove:parseFloat(document.getElementById('setWdAuto').value)||10,refCommission:parseFloat(document.getElementById('setRefComm').value)||0.1,maintenanceMode:S.get('ibs_platform_settings',{}).maintenanceMode||false};S.set('ibs_platform_settings',settings);addLog('Settings Updated');toast('Settings saved');}
function saveAdminMsg(){let msg=document.getElementById('adminMsgEdit').value;S.setAdminMsg(msg);addLog('Admin Message Updated');toast('Message updated');}
function toggleMaintenance(){let settings=S.get('ibs_platform_settings',{});settings.maintenanceMode=!settings.maintenanceMode;S.set('ibs_platform_settings',settings);addLog('Maintenance Mode',settings.maintenanceMode?'Enabled':'Disabled');toast(settings.maintenanceMode?'Maintenance ON':'Maintenance OFF');loadAdminSettings();}
function resetAllData(){if(!confirm('⚠️ This will DELETE ALL platform data. Are you sure?'))return;if(!confirm('FINAL WARNING: All users, transactions, and data will be permanently deleted!'))return;localStorage.clear();addLog('Platform Reset');toast('All data reset. Reloading...');setTimeout(()=>location.reload(),1500);}
function clearAllLogs(){S.saveLogs([]);toast('Logs cleared');loadAdminLogs();}

// ====== LOGS TAB ======
function loadAdminLogs(){
  document.getElementById('adminContent').innerHTML=`
    <div class="card"><div class="sec-header"><h3>Activity Logs</h3><div><button class="btn-xs" onclick="clearAllLogs()"><i class="fa fa-trash"></i> Clear</button><input type="text" id="logSearch" class="form-input" style="display:inline-block;width:200px;margin-left:8px;" placeholder="Search logs..." oninput="renderLogs()"></div></div>
    <div id="logsList"></div></div>`;
  renderLogs();
}
function renderLogs(){
  let logs=S.logs();let search=(document.getElementById('logSearch')?.value||'').toLowerCase();
  if(search)logs=logs.filter(l=>l.action.toLowerCase().includes(search)||(l.details||'').toLowerCase().includes(search));
  document.getElementById('logsList').innerHTML=logs.length?`
    <table class="admin-table"><thead><tr><th>Time</th><th>Action</th><th>Details</th><th>By</th></tr></thead>
    <tbody>${logs.slice(0,100).map(l=>`<tr><td style="font-size:11px;">${fmtDate(l.ts)}</td><td>${escHTML(l.action)}</td><td style="font-size:12px;color:var(--text2);">${escHTML(l.details||'-')}</td><td style="font-size:11px;">${l.by||'system'}</td></tr>`).join('')}</tbody></table>
    <div style="margin-top:12px;font-size:12px;color:var(--text2);">Showing ${Math.min(logs.length,100)} of ${logs.length} logs</div>`
    :'<div style="text-align:center;padding:40px;color:var(--text2);">No logs found</div>';
}
</script>
</body>
</html>
