function approveAllPendingPay(){if(!confirm('Approve ALL pending payments? This will activate packages for all users.'))return;let p=S.pending();let count=0;let users=S.users();p.forEach(x=>{if(x.status==='pending'){x.status='approved';count++;let userEmail=x.userEmail||x.userId;let u=users[userEmail];if(u){if(!u.packageHistory)u.packageHistory=[];u.packageHistory.push({name:x.packageName,price:x.amount,ts:new Date().toISOString()});let cat=getPackageCatalog().find(c=>c.name===x.packageName);if(cat){u.activePackage={name:cat.name,price:cat.price};u.packagePerks={dailyAds:cat.ads,adReward:cat.reward};}else{u.activePackage={name:x.packageName,price:x.amount};u.packagePerks={dailyAds:25,adReward:0.05};}u.totalDeposits=(u.totalDeposits||0)+x.amount;addTx(u,'deposit',x.amount,`${x.packageName} package activated via ${x.method}`);users[userEmail]=u;}if(userEmail)addNotif(userEmail,`Your payment for ${x.packageName} package has been approved! 🎉`,'✅');}});S.savePending(p);S.saveUsers(users);addLog('Bulk Approve Payments',`${count} payments approved`);toast(`${count} payments approved ✅`,'success');loadAdminPayments();}

  document.getElementById('adminPayTable').innerHTML=filtered.length?`

    <td>${x.packageName}</td><td>${fmtMoney(x.amount)}</td><td>${x.method||'-'}</td>
    <td style="font-size:11px;">${fmtDate(x.ts)}</td>
    <td>${x.proofImage?`<img src="${x.proofImage}" style="width:48px;height:48px;object-fit:cover;border-radius:6px;cursor:pointer;border:1px solid var(--border);" onclick="window.open('${x.proofImage}','_blank')" title="Click to view full image">`:

    :'<div style="text-align:center;padding:40px;color:var(--text2);">No payments found</div>';
}
function approvePay(id){let p=S.pending();let idNum=Number(id);let idx=p.findIndex(x=>Number(x.id)===idNum);if(idx===-1){toast('Payment not found','error');return;}p[idx].status='approved';S.savePending(p);let userEmail=p[idx].userEmail||p[idx].userId;let u=S.users()[userEmail];if(u){if(!u.packageHistory)u.packageHistory=[];u.packageHistory.push({name:p[idx].packageName,price:p[idx].amount,ts:new Date().toISOString()});let cat=getPackageCatalog().find(x=>x.name===p[idx].packageName);if(cat){u.activePackage={name:cat.name,price:cat.price};u.packagePerks={dailyAds:cat.ads,adReward:cat.reward};}else{u.activePackage={name:p[idx].packageName,price:p[idx].amount};u.packagePerks={dailyAds:25,adReward:0.05};}// Update totalDeposits and add transaction record
u.totalDeposits=(u.totalDeposits||0)+p[idx].amount;addTx(u,'deposit',p[idx].amount,`${p[idx].packageName} package activated via ${p[idx].method}`);S.saveOneUser(userEmail,u);}if(userEmail)addNotif(userEmail,`Your payment for ${p[idx].packageName} package has been approved! Package is now active. 🎉`,'✅');addLog('Payment Approved',`${p[idx].userName} — ${p[idx].packageName}`);toast('✅ Payment approved & package activated');refreshAdminTab();}
function rejectPay(id){let p=S.pending();let idNum=Number(id);let idx=p.findIndex(x=>Number(x.id)===idNum);if(idx===-1){toast('Payment not found','error');return;}let reason=prompt('Rejection reason (optional):');if(reason===null)return;p[idx].status='rejected';S.savePending(p);let userEmail=p[idx].userEmail||p[idx].userId;if(userEmail)addNotif(userEmail,`Your payment for ${p[idx].packageName} was rejected${reason?': '+reason:'. Please contact support.'}`,'❌');addLog('Payment Rejected',`${p[idx].userName} — ${p[idx].packageName}${reason?' ('+reason+')':''}`);toast('Payment rejected');refreshAdminTab();}

function addAdForm(){
  _adFormOpen = true;
  let area = document.getElementById('adFormArea');
  if(area) area.innerHTML = _adFormHTML('add', null);
  // Scroll to form
  setTimeout(()=>{ let f=document.getElementById('adFormBox'); if(f)f.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
}

function editAdForm(id){
  let ad=S.ads().find(a=>a.id===id);
  if(!ad){toast('Ad not found','error');return;}
  _adFormOpen = true;
  let area = document.getElementById('adFormArea');
  if(area) area.innerHTML = _adFormHTML('edit', ad);
  setTimeout(()=>{ let f=document.getElementById('adFormBox'); if(f)f.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
}

function closeAdForm(){
  _adFormOpen = false;
  let area = document.getElementById('adFormArea');
  if(area) area.innerHTML = '';
  renderAdsManager();
}

function saveNewAd(){
  let name=document.getElementById('adInputName')?.value.trim();
  let reward=parseFloat(document.getElementById('adInputReward')?.value);
  let duration=parseInt(document.getElementById('adInputDuration')?.value)||30;
  let url=(document.getElementById('adInputUrl')?.value||'').trim();
  let desc=(document.getElementById('adInputDesc')?.value||'').trim();
  if(!name){toast('Ad name is required','error');return;}
  if(!reward||reward<=0){toast('Enter a valid reward amount','error');return;}
  let ads=S.ads();
  let id=ads.length?Math.max(...ads.map(a=>a.id))+1:1;
  ads.push({id,name,reward,duration,url,desc,active:true});
  S.saveAds(ads);
  addLog('Ad Created',name);
  toast('✅ Ad added — live to all users now!','success');
  closeAdForm();
}

function saveEditAd(id){
  let name=document.getElementById('adInputName')?.value.trim();
  let reward=parseFloat(document.getElementById('adInputReward')?.value);
  let duration=parseInt(document.getElementById('adInputDuration')?.value)||30;
  let url=(document.getElementById('adInputUrl')?.value||'').trim();
  let desc=(document.getElementById('adInputDesc')?.value||'').trim();
  if(!name){toast('Ad name is required','error');return;}
  if(!reward||reward<=0){toast('Enter a valid reward amount','error');return;}
  let ads=S.ads();
  let idx=ads.findIndex(a=>a.id===id);
  if(idx===-1){toast('Ad not found','error');return;}
  ads[idx]={...ads[idx],name,reward,duration,url,desc};
  S.saveAds(ads);
  addLog('Ad Updated',name);
  toast('✅ Ad updated — changes live to all users!','success');
  closeAdForm();
}

function toggleAdActive(id){
  let ads=S.ads();
  let idx=ads.findIndex(a=>a.id===id);
  if(idx===-1)return;
  ads[idx].active=ads[idx].active===false?true:false;
  S.saveAds(ads);
  addLog('Ad '+(ads[idx].active?'Enabled':'Disabled'),ads[idx].name);
  toast(ads[idx].active?'Ad enabled — users can see it':'Ad hidden from users');
  renderAdsManager();
}

function editAd(id){editAdForm(id);}  // backward compat shim

function deleteAd(id){
  if(_adFormOpen){toast('Close the form first before deleting','error');return;}
  let ad=S.ads().find(a=>a.id===id);
  if(!ad)return;
  if(!confirm('Delete ad "'+ad.name+'"? This cannot be undone.'))return;
  let ads=S.ads().filter(a=>a.id!==id);
  S.saveAds(ads);
  addLog('Ad Deleted',ad.name);
  toast('Ad deleted');
  renderAdsManager();
}

function addTaskForm(){
  _taskFormOpen=true;
  let area=document.getElementById('taskFormArea');
  if(area) area.innerHTML=_taskFormHTML('add',null);
  setTimeout(()=>{let f=document.getElementById('taskFormBox');if(f)f.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}
function editTaskForm(id){
  let task=S.tasks().find(t=>t.id===id);
  if(!task){toast('Task not found','error');return;}
  _taskFormOpen=true;
  let area=document.getElementById('taskFormArea');
  if(area) area.innerHTML=_taskFormHTML('edit',task);
  setTimeout(()=>{let f=document.getElementById('taskFormBox');if(f)f.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}
function closeTaskForm(){
  _taskFormOpen=false;
  let area=document.getElementById('taskFormArea');
  if(area) area.innerHTML='';
  renderTasksManager();
}
function saveNewTask(){
  let name=document.getElementById('taskInputName')?.value.trim();
  let reward=parseFloat(document.getElementById('taskInputReward')?.value);
  let url=(document.getElementById('taskInputUrl')?.value||'').trim();
  if(!name){toast('Task name is required','error');return;}
  if(!reward||reward<=0){toast('Enter a valid reward amount','error');return;}
  let tasks=S.tasks();
  let id=tasks.length?Math.max(...tasks.map(t=>t.id))+1:1;
  tasks.push({id,name,reward,url:url||'#'});
  S.saveTasks(tasks);
  addLog('Task Created',name);
  toast('✅ Task added — live to all users!','success');
  closeTaskForm();
}
function saveEditTask(id){
  let name=document.getElementById('taskInputName')?.value.trim();
  let reward=parseFloat(document.getElementById('taskInputReward')?.value);
  let url=(document.getElementById('taskInputUrl')?.value||'').trim();
  if(!name){toast('Task name is required','error');return;}
  if(!reward||reward<=0){toast('Enter a valid reward amount','error');return;}
  let tasks=S.tasks();
  let idx=tasks.findIndex(t=>t.id===id);
  if(idx===-1){toast('Task not found','error');return;}
  tasks[idx]={...tasks[idx],name,reward,url:url||tasks[idx].url||'#'};
  S.saveTasks(tasks);
  addLog('Task Updated',name);
  toast('✅ Task updated — changes live!','success');
  closeTaskForm();
}
function editTask(id){editTaskForm(id);}  // backward compat shim
function deleteTask(id){
  if(_taskFormOpen){toast('Close the form first before deleting','error');return;}
  let task=S.tasks().find(t=>t.id===id);
  if(!task)return;
  if(!confirm('Delete task "'+task.name+'"?'))return;
  let tasks=S.tasks().filter(t=>t.id!==id);
  S.saveTasks(tasks);
  addLog('Task Deleted',task.name);
  toast('Task deleted');
  renderTasksManager();
}

function sendBroadcast(){
  let title=document.getElementById('broadcastTitle')?.value.trim()||'';
  let msg=document.getElementById('broadcastMsg')?.value.trim()||'';
  let target=document.getElementById('broadcastTarget')?.value||'all';
  let icon=document.getElementById('broadcastIcon')?.value||'📢';
  if(!msg){toast('Enter a message first','error');return;}
  let users=S.users();
  let all=Object.values(users).filter(u=>!isAdminEmail(u.email));
  let targets=all.filter(u=>{
    if(target==='all')return true;
    if(target==='active')return !u.blocked;
    if(target==='blocked')return u.blocked;
    if(target==='verified')return u.verified;
    return false;
  });
  if(!targets.length){toast('No users match this target audience','error');return;}
  let targetLabel={all:'All Users',active:'Active Users',verified:'Verified Users',blocked:'Blocked Users'}[target]||'All Users';
  if(!confirm(`Send broadcast to ${targets.length} ${targetLabel}?\n\nTitle: ${title||'(none)'}\nMessage: ${msg.substring(0,100)}${msg.length>100?'...':''}`))return;
  // Send notification to each target user — use selected icon
  let fullMsg=title?`${title}: ${msg}`:msg;
  targets.forEach(u=>addNotif(u.email,fullMsg,icon));
  // Save to broadcasts list (shown on home notice board)
  let broadcast={
    id:Date.now(),
    title:title||'Update',
    message:msg,
    text:msg,
    fullMsg:fullMsg,
    icon:icon,
    target:target,
    targetLabel:targetLabel,
    ts:new Date().toISOString(),
    count:targets.length
  };
  let history=S.get('ibs_broadcasts',[]);
  if(!Array.isArray(history))history=[];
  history.unshift(broadcast);
  if(history.length>50)history=history.slice(0,50);
  S.set('ibs_broadcasts',history);
  // S.set upar already kv/all save kar deta hai — koi extra call nahi
  addLog('Broadcast Sent',`To ${targets.length} ${targetLabel}: ${fullMsg.substring(0,50)}`);
  toast(`${icon} Broadcast sent to ${targets.length} ${targetLabel}!`,'success');
  // Clear form fields
  if(document.getElementById('broadcastMsg'))document.getElementById('broadcastMsg').value='';
  if(document.getElementById('broadcastTitle'))document.getElementById('broadcastTitle').value='';
  document.querySelectorAll('.quick-tpl-btn').forEach(b=>b.classList.remove('tpl-active'));
  let previewEl=document.getElementById('broadcastLivePreview');
  if(previewEl)previewEl.style.display='none';
  loadAdminBroadcast();
}

function quickBroadcast(type,btnEl){
  let templates={
    maintenance:{title:'🔧 Maintenance Notice',icon:'🔧',msg:'Scheduled maintenance tonight from 11 PM to 1 AM. Services may be temporarily unavailable. We apologize for any inconvenience.'},
    update:{title:'🆕 New Update!',icon:'🆕',msg:'New features have been added to the platform! Check out the latest updates and enjoy an improved experience.'},
    bonus:{title:'🎁 Bonus Event!',icon:'🎁',msg:'Special bonus event is LIVE! Earn double rewards on all ads for the next 24 hours. Login now and start earning!'},
    lottery:{title:'🎰 Lottery is Live!',icon:'🎰',msg:'The lucky draw lottery is now open! Buy your tickets from the Lottery section in the sidebar. Draw will be held soon — good luck!'},
    warning:{title:'⚠️ Important Notice',icon:'⚠️',msg:'Please verify your KYC and account details to avoid suspension. Contact support if you have any issues.'},
    holiday:{title:'🎉 Holiday Greetings!',icon:'🎉',msg:'Wishing you a happy holiday! Enjoy special rewards and bonuses during this festive season. Thank you for being with us!'}
  };
  let t=templates[type]||{title:'',icon:'📢',msg:''};
  let titleEl=document.getElementById('broadcastTitle');
  let msgEl=document.getElementById('broadcastMsg');
  let iconEl=document.getElementById('broadcastIcon');
  if(titleEl)titleEl.value=t.title;
  if(msgEl){msgEl.value=t.msg;msgEl.focus();}
  // Set matching icon in the dropdown
  if(iconEl){
    let opt=Array.from(iconEl.options).find(o=>o.value===t.icon);
    if(opt)iconEl.value=t.icon;
  }
  // Highlight the clicked template button (walk up to the .quick-tpl-btn)
  document.querySelectorAll('.quick-tpl-btn').forEach(b=>b.classList.remove('tpl-active'));
  let btn=btnEl||(typeof event!=='undefined'&&event&&event.target?event.target.closest('.quick-tpl-btn'):null);

function getAllConvos(){
  let msgs=S.msgs();let users=S.users();
  return Object.keys(msgs).filter(k=>!isAdminEmail(k)&&users[k]).map(k=>{
    let c=msgs[k];let convo=Array.isArray(c)?{status:'open',unread:{admin:c.filter(m=>m.from!=='bot'&&!isAdminSender(m.from)).length,user:c.filter(m=>isAdminSender(m.from)||m.from==='bot').length},messages:c}:c;
    let lastMsg=convo.messages.length?convo.messages[convo.messages.length-1]:null;
    return{email:k,name:users[k].name,avatar:users[k].avatar,verified:users[k].verified,status:convo.status,unread:convo.unread||{admin:0,user:0},lastMsg:lastMsg?lastMsg.text:'',lastTs:lastMsg?lastMsg.ts:0,msgCount:convo.messages.length};
  }).sort((a,b)=>b.lastTs-a.lastTs);
}
function renderConvoList(){
  let convos=getAllConvos();let search=(document.getElementById('convoSearch')?.value||'').toLowerCase();
  let filter=window._convoFilter||'all';
  convos=convos.filter(c=>{
    if(search&&!c.name.toLowerCase().includes(search)&&!c.email.toLowerCase().includes(search))return false;
    if(filter==='open')return c.status==='open';if(filter==='unread')return(c.unread?.admin||0)>0;if(filter==='resolved')return c.status==='resolved';return true;
  });
  document.getElementById('convoList').innerHTML=convos.length?convos.map(c=>`
    <div class="admin-convo-item${_selectedConvo===c.email?' active':''}" onclick="openAdminConvo('${c.email}')">

        <div style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escHTML(c.lastMsg?.substring(0,40)||'No messages')}</div>
      </div>
      ${c.unread?.admin?`<span class="admin-convo-unread">${c.unread.admin}</span>`:''}
      ${c.status==='resolved'?'<span style="font-size:10px;color:var(--green);">✓</span>':''}
    </div>`).join(''):'<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">No conversations</div>';
}

function filterConvoStatus(f,btn){window._convoFilter=f;document.querySelectorAll('.admin-chat-sidebar-header .btn-xs').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderConvoList();}
function openAdminConvo(email){

function renderAdminChatMsgs(email){
  let c=document.getElementById('adminChatMsgs');if(!c)return;
  let convo=getConvo(email);let msgs=convo.messages||[];
  let users=S.users();let targetU=users[email];
  let html='';let lastDate='';
  msgs.forEach(m=>{
    let d=new Date(m.ts).toLocaleDateString('en-PK',{day:'numeric',month:'short',year:'numeric'});
    if(d!==lastDate){html+=`<div class="chat-date-sep"><span>${d}</span></div>`;lastDate=d;}
    // In admin view: user msgs left (.user), admin's own replies right (.admin-self), bot left (.bot)
    let cls='user';
    if(m.from==='bot') cls='bot';
    else if(isAdminSender(m.from)) cls='admin-self';
    else if(m.type==='system') cls='system';
    let imgHtml=m.type==='image'&&m.image?`<img src="${m.image}" class="chat-img-preview" onclick="window.open(this.src)" onload="this.closest('#adminChatMsgs').scrollTop=9999">`:'';
    let senderName='';let senderVerified=false;
    if(cls==='user'){senderName=targetU?.displayName||targetU?.name||'User';senderVerified=!!targetU?.verified;}
    else if(cls==='admin-self'){let adminU=users[adminEmail()];senderName=adminU?.displayName||adminU?.name||'You (Support)';senderVerified=true;}
    else if(cls==='bot'){senderName='IBS Bot';senderVerified=false;}
    let senderHtml=cls==='system'||!senderName?'':`<div style="font-size:11px;font-weight:600;opacity:.85;margin-bottom:4px;">${nm(senderName,senderVerified,'sm')}</div>`;
    let statusDot=cls==='admin-self'?`<span style="font-size:9px;opacity:.7;margin-left:4px;">${m.status==='read'?'✓✓':m.status==='delivered'?'✓✓':'✓'}</span>`:'';
    html+=`<div class="chat-bubble ${cls}">${senderHtml}${escHTML(m.text)}${imgHtml}<div class="chat-bubble-time">${fmtDate(m.ts)}${statusDot}</div></div>`;
  });
  if(!msgs.length)html='<div style="text-align:center;padding:40px;color:var(--text2);">No messages yet</div>';
  c.innerHTML=html;
  // Smooth scroll after layout
  requestAnimationFrame(()=>{ c.scrollTop=c.scrollHeight; });
}
function adminSendReply(email){
  let inp=document.getElementById('adminChatInp');
  if(!inp||!inp.value.trim())return;
  let text=inp.value.trim();
  inp.value='';inp.focus();
  let sendBtn=document.querySelector('.chat-send-btn');
  if(sendBtn){sendBtn.disabled=true;sendBtn.innerHTML='<i class="fa fa-circle-notch fa-spin"></i>';}
  let convo=getConvo(email);
  convo.messages.push({from:adminEmail(),text,ts:Date.now(),type:'text',status:'sent'});
  convo.unread.user=(convo.unread.user||0)+1;
  // Mark all user messages in this convo as read since admin is viewing
  convo.unread.admin=0;
  convo.messages.forEach(m=>{if(m.from===email&&m.status!=='read')m.status='read';});
  saveConvo(email,convo).then(()=>{
    if(sendBtn){sendBtn.disabled=false;sendBtn.innerHTML='<i class="fa fa-paper-plane"></i>';}
  }).catch(err=>{
    if(sendBtn){sendBtn.disabled=false;sendBtn.innerHTML='<i class="fa fa-paper-plane"></i>';}
    toast('⚠️ Reply may not have saved — check connection','error');
  });
  addNotif(email,`💬 Support: ${text.substring(0,80)}`,'💬',{type:'open_support_chat',focusReply:1});
  addLog('Admin Reply',`To ${email}`);
  renderAdminChatMsgs(email);
  renderConvoList();
}
function adminQuickReply(email,text){
  let convo=getConvo(email);
  convo.messages.push({from:adminEmail(),text,ts:Date.now(),type:'text',status:'sent'});
  convo.unread.user=(convo.unread.user||0)+1;
  convo.unread.admin=0;
  convo.messages.forEach(m=>{if(m.from===email&&m.status!=='read')m.status='read';});
  saveConvo(email,convo).catch(()=>toast('⚠️ Quick reply may not have saved','error'));
  addNotif(email,`💬 Support: ${text.substring(0,80)}`,'💬',{type:'open_support_chat',focusReply:1});
  addLog('Admin Quick Reply',`To ${email}`);
  renderAdminChatMsgs(email);renderConvoList();
}
function adminAttachImage(email){
  let inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=e=>{let f=inp.files[0];if(!f)return;let r=new FileReader();r.onload=ev=>{let convo=getConvo(email);convo.messages.push({from:adminEmail(),text:'📷 Image',ts:Date.now(),type:'image',image:ev.target.result,status:'sent'});convo.unread.user=(convo.unread.user||0)+1;saveConvo(email,convo);addNotif(email,'Support sent an image','📷',{type:'open_support_chat',focusReply:1});renderAdminChatMsgs(email);};r.readAsDataURL(f);};
  inp.click();
}
function adminMarkResolved(email){let convo=getConvo(email);convo.status='resolved';convo.messages.push({from:'system',text:'Conversation marked as resolved',ts:Date.now(),type:'system',status:'read'});saveConvo(email,convo);addNotif(email,'Your support ticket has been resolved. Thank you!','✅');addLog('Convo Resolved',email);toast('Marked resolved');openAdminConvo(email);}
function adminMarkOpen(email){let convo=getConvo(email);convo.status='open';convo.messages.push({from:'system',text:'Conversation reopened',ts:Date.now(),type:'system',status:'read'});saveConvo(email,convo);addLog('Convo Reopened',email);toast('Reopened');openAdminConvo(email);}

function saveLotterySettings(){
  let lottery=S.get('ibs_lottery',null)||{enabled:false,ticketPrice:50,prizes:[],tickets:[],winner:null,title:'Weekly Lottery',description:''};
  let priceEl=document.getElementById('lotteryPrice');
  let dateEl=document.getElementById('lotteryDrawDate');
  let timeEl=document.getElementById('lotteryDrawTime');
  let titleEl=document.getElementById('lotteryTitle');
  let descEl=document.getElementById('lotteryDesc');
  if(priceEl&&priceEl.value)lottery.ticketPrice=parseInt(priceEl.value)||50;
  if(dateEl)lottery.drawDate=dateEl.value;
  if(timeEl&&timeEl.value)lottery.drawTime=timeEl.value;
  if(titleEl&&titleEl.value.trim())lottery.title=titleEl.value.trim();
  if(descEl)lottery.description=descEl.value.trim();
  if(!lottery.prizes)lottery.prizes=[{rank:1,amount:5000},{rank:2,amount:2000},{rank:3,amount:1000}];
  if(!lottery.tickets)lottery.tickets=[];
  S.set('ibs_lottery',lottery);
  let u=getU();if(u)buildSidebar(u);
  addLog('Lottery Settings Updated');
  toast('✅ Lottery settings saved!');
  loadAdminLottery();
}

function downloadAllData(){
  let data={
    exportDate:new Date().toISOString(),
    users:S.users(),
    withdrawals:S.wd(),
    pendingPayments:S.pending(),
    tasks:S.tasks(),
    ads:S.ads(),
    messages:S.msgs(),
    logs:S.logs(),
    settings:S.get('ibs_platform_settings',{}),
    broadcasts:S.get('ibs_broadcasts',[]),
    packages:S.get('ibs_pkgs_custom',[])
  };
  let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='ibs_backup_'+new Date().toISOString().split('T')[0]+'.json';
  a.click();addLog('Data Backup Downloaded');toast('Data downloaded successfully!');
}

async function resetAllData(){if(!confirm('⚠️ This will DELETE ALL platform data. Are you sure?'))return;if(!confirm('FINAL WARNING: All users, transactions, and data will be permanently deleted!'))return;await S.saveUsers({});await S.saveWd([]);await S.savePending([]);await S.saveTasks([]);await S.saveAds([]);await S.saveMsgs({});await S.saveLogs([]);S.set('ibs_platform_settings',{});S.set('ibs_broadcasts',[]);S.set('ibs_pkgs_custom',[]);S.set('ibs_lottery',null);S.set('ibs_chat_ratings',[]);addLog('Platform Reset');toast('All cloud data reset. Reloading...');setTimeout(()=>location.reload(),1200);}

// Clear local cache only — preserves session and forces fresh Firebase reload
function clearLocalData(){
  let sess=sessionStorage.getItem('ibs_session');
  S._cache = {users:{},msgs:{},wd:[],pending:[],tasks:[],ads:[],logs:[],kv:{}};
  S._loaded = false;
  // Restore session so user doesn't get logged out
  if(sess)sessionStorage.setItem('ibs_session',sess);
  toast('Local cache cleared. Reloading from Firebase...','success');
  setTimeout(()=>location.reload(),1200);
}

}
function renderLogs(){
  let logs=S.logs();let search=(document.getElementById('logSearch')?.value||'').toLowerCase();
  if(search)logs=logs.filter(l=>l.action.toLowerCase().includes(search)||(l.details||'').toLowerCase().includes(search));
  document.getElementById('logsList').innerHTML=logs.length?`
    <table class="admin-table"><thead><tr><th>Time</th><th>Action</th><th>Details</th><th>By</th></tr></thead>
    <tbody>${logs.slice(0,100).map(l=>`<tr><td style="font-size:11px;">${fmtDate(l.ts)}</td><td>${escHTML(l.action)}</td><td style="font-size:12px;color:var(--text2);">${escHTML(l.details||'-')}</td><td style="font-size:11px;">${l.by||'system'}</td></tr>`).join('')}</tbody></table>
    <div style="margin-top:12px;font-size:12px;color:var(--text2);">Showing ${Math.min(logs.length,100)} of ${logs.length} logs</div>`
    :'<div style="text-align:center;padding:40px;color:var(--text2);">No logs found</div>';
}
</script>
</body>
</html>
